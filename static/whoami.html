<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Who Am I Debug</title>
    <style>
        body { margin: 12px; }
        pre {
            max-height: 70vh;
            overflow: auto;
            border: 1px solid #ccc;
            padding: 8px;
        }
    </style>
</head>
<body>
<div>
    <h1>Тестовый профиль клиента</h1>
    <p>Страница отправляет серверу клиентские метаданные и показывает объединенный результат.</p>

    <div>
        <button id="refreshBtn">Обновить данные</button>
    </div>

    <div id="status">Готово к сбору.</div>
    <pre id="result">{}</pre>
</div>

<script>
    const SESSION_STORAGE_KEY = 'debug_user_context_session_id';

    function safeNavigatorField(path, fallback = null) {
        try {
            return path();
        } catch (_err) {
            return fallback;
        }
    }

    function getSessionId() {
        let sessionId = localStorage.getItem(SESSION_STORAGE_KEY);
        if (!sessionId) {
            sessionId = (window.crypto && crypto.randomUUID)
                ? crypto.randomUUID()
                : 'sess_' + Date.now() + '_' + Math.random().toString(16).slice(2);
            localStorage.setItem(SESSION_STORAGE_KEY, sessionId);
        }
        return sessionId;
    }

    function getEventId() {
        return (window.crypto && crypto.randomUUID)
            ? crypto.randomUUID()
            : 'evt_' + Date.now() + '_' + Math.random().toString(16).slice(2);
    }

    async function getUserAgentHints() {
        const uaData = safeNavigatorField(() => navigator.userAgentData, null);
        if (!uaData) {
            return null;
        }

        const basic = {
            brands: uaData.brands,
            mobile: uaData.mobile,
            platform: uaData.platform,
        };

        if (!uaData.getHighEntropyValues) {
            return basic;
        }

        try {
            const high = await uaData.getHighEntropyValues([
                'platformVersion',
                'architecture',
                'model',
                'uaFullVersion',
                'bitness',
                'fullVersionList',
            ]);
            return { ...basic, ...high };
        } catch (_err) {
            return basic;
        }
    }

    async function getLanIpCandidates() {
        const RTCPeerConnectionCtor = window.RTCPeerConnection || window.webkitRTCPeerConnection;
        if (!RTCPeerConnectionCtor) {
            return [];
        }

        const ipv4Regex = /^(?:25[0-5]|2[0-4]\d|1?\d?\d)(?:\.(?:25[0-5]|2[0-4]\d|1?\d?\d)){3}$/;
        const ipv6Regex = /^[0-9a-fA-F:]+$/;

        function extractIpFromCandidateLine(candidateLine) {
            const parts = (candidateLine || '').split(' ').map(x => x.trim()).filter(Boolean);
            for (const token of parts) {
                if (ipv4Regex.test(token)) {
                    return token;
                }
                if (token.includes(':') && ipv6Regex.test(token) && token.length >= 4 && token.length <= 45) {
                    return token;
                }
            }
            return null;
        }

        return new Promise((resolve) => {
            const ips = new Set();
            const pc = new RTCPeerConnectionCtor({ iceServers: [] });

            const timeoutId = setTimeout(() => {
                try { pc.close(); } catch (_err) {}
                resolve(Array.from(ips));
            }, 1500);

            pc.onicecandidate = (event) => {
                if (!event || !event.candidate || !event.candidate.candidate) {
                    return;
                }
                const candidate = event.candidate.candidate;
                const ipCandidate = extractIpFromCandidateLine(candidate);
                if (ipCandidate) {
                    ips.add(ipCandidate);
                }
            };

            pc.createDataChannel('debug');
            pc.createOffer()
                .then(offer => pc.setLocalDescription(offer))
                .catch(() => {
                    clearTimeout(timeoutId);
                    try { pc.close(); } catch (_err) {}
                    resolve(Array.from(ips));
                });

            setTimeout(() => {
                clearTimeout(timeoutId);
                try { pc.close(); } catch (_err) {}
                resolve(Array.from(ips));
            }, 1800);
        });
    }

    async function getPublicIpCandidate() {
        try {
            const response = await fetch('https://api64.ipify.org?format=json', { method: 'GET' });
            if (!response.ok) {
                return null;
            }
            const data = await response.json();
            return data.ip || null;
        } catch (_err) {
            return null;
        }
    }

    async function buildClientContext() {
        const uaHints = await getUserAgentHints();
        const lanIpCandidates = await getLanIpCandidates();
        const publicIpCandidate = await getPublicIpCandidate();
        const connection = safeNavigatorField(() => navigator.connection, null);

        return {
            client_timestamp_utc: new Date().toISOString(),
            page_url: window.location.href,
            user_agent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages,
            cookie_enabled: navigator.cookieEnabled,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezone_offset_minutes: new Date().getTimezoneOffset(),
            screen: {
                width: window.screen.width,
                height: window.screen.height,
                avail_width: window.screen.availWidth,
                avail_height: window.screen.availHeight,
                color_depth: window.screen.colorDepth,
                pixel_ratio: window.devicePixelRatio || 1
            },
            viewport: {
                width: window.innerWidth,
                height: window.innerHeight
            },
            hardware_concurrency: safeNavigatorField(() => navigator.hardwareConcurrency),
            device_memory_gb: safeNavigatorField(() => navigator.deviceMemory),
            max_touch_points: safeNavigatorField(() => navigator.maxTouchPoints),
            online: navigator.onLine,
            network_effective_type: safeNavigatorField(() => connection && connection.effectiveType),
            network_downlink_mbps: safeNavigatorField(() => connection && connection.downlink),
            network_rtt_ms: safeNavigatorField(() => connection && connection.rtt),
            network_save_data: safeNavigatorField(() => connection && connection.saveData),
            do_not_track: navigator.doNotTrack,
            user_agent_hints: uaHints,
            lan_ip_candidates: lanIpCandidates,
            public_ip_candidate: publicIpCandidate,
        };
    }

    async function loadContext() {
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        status.innerText = 'Собираем данные...';

        const payload = {
            user: 'debug_local_user',
            dashboard: 'debug_page',
            session_id: getSessionId(),
            event_id: getEventId(),
            event_type: 'manual_debug_probe',
            client_context: await buildClientContext()
        };

        try {
            const response = await fetch('/debug/user-context', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            const json = await response.json();
            result.textContent = JSON.stringify(json, null, 2);
            status.innerText = 'Готово. Данные актуальны на текущий момент.';
        } catch (err) {
            status.innerText = 'Ошибка запроса к серверу.';
            result.textContent = JSON.stringify({ error: String(err) }, null, 2);
        }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadContext);
    loadContext();
</script>
</body>
</html>
